<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <!-- 手机端适配关键 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>doddle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui;
            background: #f5f5f5;
            text-align: center;
            padding-top: 60px;
        }

        .time {
            font-size: 60px;
            font-weight: bold;
            margin: 40px 0;
        }

        .info {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="time" id="timeText">00:00:00</div>
    <div class="info" id="infoText">加载中...</div>

    <div>
        <button class="btn" onclick="startTimer()">开始</button>
        <button class="btn" onclick="pauseTimer()">暂停</button>
        <button class="btn" onclick="saveTimer()">结束保存</button>
    </div>

    <script>
        // 全局变量 对应你之前的 start_time / elapsed / running
        let startTime = 0;
        let elapsed = 0;
        let running = false;
        let data = { total_seconds: 0, daily: {} };

        // 1. 读取本地 data.json
        async function loadData() {
            try {
                const res = await fetch("./.doddledata/data.json");
                data = await res.json();
            } catch (e) {
                // 文件不存在，用默认数据
                data = { total_seconds: 0, daily: {} };
            }
            renderInfo();
        }

        // 2. 格式化秒 → 时:分:秒
        function formatTime(s) {
            let h = Math.floor(s / 3600);
            let m = Math.floor((s % 3600) / 60);
            let sec = s % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        // 3. 刷新界面文字
        function renderInfo() {
            document.getElementById("timeText").innerText = formatTime(elapsed);
            let totalHour = (data.total_seconds / 3600).toFixed(1);
            document.getElementById("infoText").innerText = `总时长：${totalHour} 小时`;
        }

        // 4. 计时循环
        function tick() {
            if (!running) return;
            elapsed = Date.now() - startTime;
            elapsed = Math.floor(elapsed / 1000);
            document.getElementById("timeText").innerText = formatTime(elapsed);
            requestAnimationFrame(tick);
        }

        // 开始
        function startTimer() {
            if (running) return;
            startTime = Date.now() - elapsed * 1000;
            running = true;
            tick();
        }

        // 暂停
        function pauseTimer() {
            running = false;
        }

        // 结束 + 保存下载 json
        function saveTimer() {
            running = false;
            if (elapsed <= 0) return;

            // 今日日期 yyyy-mm-dd
            let today = new Date().toISOString().slice(0, 10);
            data.total_seconds += elapsed;
            if (!data.daily[today]) data.daily[today] = 0;
            data.daily[today] += elapsed;

            // 导出 json 文件
            let jsonStr = JSON.stringify(data, null, 2);
            let blob = new Blob([jsonStr], { type: "application/json" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "data.json";
            a.click();

            // 重置计时
            elapsed = 0;
            renderInfo();
            alert("已保存！下载data.json上传覆盖坚果云即可同步");
        }

        // 初始化
        loadData();
    </script>
</body>

</html>
